# FlatLaf configuration for Bio-Lab Evolution Simulator
#
# fullWindowContent: CustomHeaderPanel extends into the native title bar area.
# The OS provides the native frame (rounded corners, resize, Aero Snap, shadow).
# FlatLaf hides its built-in title/icon/buttons because CustomHeaderPanel replaces them.
# Enable full window content mode ? app content extends under the title bar
TitlePane.fullWindowContent=true
TitlePane.showIcon=false
TitlePane.showTitle=false
TitlePane.showIconBesideTitle=false
TitlePane.menuBarEmbedded=false
TitlePane.background=#14141C
TitlePane.inactiveBackground=#14141C
TitlePane.unifiedBackground=true
TitlePane.centerTitle=false
TitlePane.buttonSize=0,0
TitlePane.noIconLeftGap=0
