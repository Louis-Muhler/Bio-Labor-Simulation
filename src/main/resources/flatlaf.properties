# FlatLaf configuration for Bio-Lab Evolution Simulator
#
# fullWindowContent mode: our CustomHeaderPanel extends into the FlatLaf title bar area.
# The OS provides the native Windows 11 frame (rounded corners, resize, Aero Snap, shadow).
# FlatLaf hides its own title, icon and buttons because we have our own in CustomHeaderPanel.
# Hide FlatLaf's built-in title bar elements - CustomHeaderPanel replaces them
TitlePane.showIcon=false
TitlePane.showTitle=false
TitlePane.background=#121218
TitlePane.inactiveBackground=#121218
TitlePane.unifiedBackground=true
